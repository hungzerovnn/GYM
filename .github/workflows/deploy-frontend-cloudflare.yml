name: Deploy Frontend to Cloudflare

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "publish/web/**"
      - ".github/workflows/deploy-frontend-cloudflare.yml"

concurrency:
  group: deploy-frontend-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      FRONTEND_UPSTREAM_URL: ${{ vars.FRONTEND_UPSTREAM_URL }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Validate required secrets and vars
        shell: bash
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT_NAME"
          test -n "$FRONTEND_UPSTREAM_URL"
          test -n "$NEXT_PUBLIC_API_URL"

      - name: Install app dependencies
        run: npm --prefix apps/web ci

      - name: Write publish/web/.env
        shell: bash
        run: |
          cat > publish/web/.env <<EOF
          CLOUDFLARE_PAGES_PROJECT_NAME=$CLOUDFLARE_PAGES_PROJECT_NAME
          FRONTEND_UPSTREAM_URL=$FRONTEND_UPSTREAM_URL
          NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL
          EOF

      - name: Deploy Next.js frontend worker
        run: npm --prefix apps/web run deploy

      - name: Deploy Pages proxy
        run: npm --prefix publish/web run deploy
